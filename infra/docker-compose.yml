services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: georag
      POSTGRES_USER: georag
      POSTGRES_PASSWORD: georag
    ports:
      - "5432:5432"
    volumes:
      - georag_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U georag -d georag"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  georag_postgres:
